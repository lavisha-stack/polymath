<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polymath Practice</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    max-width: 560px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { color: #777; font-size: 13px; margin-top: 0; margin-bottom: 28px; }
  .domain {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .domain h2 { font-size: 16px; margin: 0 0 4px; }
  .domain .desc { color: #888; font-size: 12px; margin-bottom: 12px; }
  .prompt-box {
    background: #f3f3f3;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    min-height: 20px;
    margin-bottom: 10px;
  }
  .prompt-box.empty { color: #aaa; font-style: italic; }
  .source-tag {
    font-size: 10px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  button {
    padding: 9px 14px;
    font-size: 13px;
    border: none;
    border-radius: 6px;
    background: #1a1a1a;
    color: #fff;
    cursor: pointer;
    margin-right: 6px;
    margin-bottom: 8px;
  }
  button.secondary { background: #eee; color: #1a1a1a; }
  button:disabled { background: #ccc; cursor: default; }
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-family: inherit;
    resize: vertical;
    margin-bottom: 8px;
  }
  .timer { font-size: 13px; color: #555; margin-bottom: 8px; }
  .feedback-box {
    background: #f0f6ff;
    border: 1px solid #d5e4fb;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
  .loading { color: #999; font-size: 12px; }
</style>
</head>
<body>

<h1>Polymath Practice</h1>
<p class="sub">One small prompt per domain. Produce something, then get feedback.</p>

<div id="app"></div>

<script>
  const DOMAINS = [
    { key: "communication", label: "Communication", desc: "Speak on the topic below for 60 seconds, then type roughly what you said.", timer: 60 },
    { key: "study", label: "Study habits", desc: "Explain the concept below from memory, no notes.", timer: 60 },
    { key: "writing", label: "Writing", desc: "A short timed micro-draft.", timer: 300 },
  ];

  const STORAGE_KEY = "polymath_entries";

  function getEntries() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }
  function saveEntry(entry) {
    const entries = getEntries();
    entries.push(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries.slice(-100)));
  }
  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }
  function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ":" + String(sec).padStart(2, "0");
  }

  const app = document.getElementById("app");

  DOMAINS.forEach((dom) => {
    const section = document.createElement("div");
    section.className = "domain";
    section.innerHTML = `
      <h2>${dom.label}</h2>
      <div class="desc">${dom.desc}</div>
      <div class="prompt-box empty" id="prompt-${dom.key}">No prompt yet — tap "Get today's prompt"</div>
      <div class="source-tag" id="source-${dom.key}"></div>
      <button id="getprompt-${dom.key}">Get today's prompt</button>
      <div id="timerwrap-${dom.key}" style="display:none;">
        <div class="timer" id="timer-${dom.key}"></div>
        <button class="secondary" id="starttimer-${dom.key}">Start timer</button>
      </div>
      <div id="responsewrap-${dom.key}" style="display:none; margin-top:10px;">
        <textarea id="response-${dom.key}" placeholder="Write what you said / explained / drafted..."></textarea>
        <br />
        <button id="submit-${dom.key}">Save & get feedback</button>
        <div class="loading" id="loading-${dom.key}" style="display:none;">Getting feedback…</div>
        <div class="feedback-box" id="feedback-${dom.key}"></div>
      </div>
    `;
    app.appendChild(section);

    document.getElementById(`getprompt-${dom.key}`).addEventListener("click", async () => {
      const box = document.getElementById(`prompt-${dom.key}`);
      const sourceTag = document.getElementById(`source-${dom.key}`);
      box.textContent = "Loading a prompt…";
      box.classList.add("empty");
      try {
        const res = await fetch(`/api/prompt?domain=${dom.key}`);
        const data = await res.json();
        box.textContent = data.prompt;
        box.classList.remove("empty");
        sourceTag.textContent = data.source === "gemini" ? "generated just now" : "from the seed list";
        document.getElementById(`timerwrap-${dom.key}`).style.display = "block";
        document.getElementById(`responsewrap-${dom.key}`).style.display = "block";
        document.getElementById(`timer-${dom.key}`).textContent = fmtTime(dom.timer);
      } catch (e) {
        box.textContent = "Couldn't load a prompt — check your connection and try again.";
      }
    });

    document.getElementById(`starttimer-${dom.key}`).addEventListener("click", (e) => {
      let remaining = dom.timer;
      const display = document.getElementById(`timer-${dom.key}`);
      e.target.disabled = true;
      const interval = setInterval(() => {
        remaining--;
        display.textContent = fmtTime(remaining);
        if (remaining <= 0) {
          clearInterval(interval);
          display.textContent = "Time's up";
          e.target.disabled = false;
        }
      }, 1000);
    });

    document.getElementById(`submit-${dom.key}`).addEventListener("click", async () => {
      const textArea = document.getElementById(`response-${dom.key}`);
      const text = textArea.value.trim();
      if (!text) return;

      const promptText = document.getElementById(`prompt-${dom.key}`).textContent;
      const loading = document.getElementById(`loading-${dom.key}`);
      const feedbackBox = document.getElementById(`feedback-${dom.key}`);
      loading.style.display = "block";
      feedbackBox.style.display = "none";

      saveEntry({ domain: dom.key, date: todayStr(), prompt: promptText, response: text });

      try {
        const res = await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ domain: dom.key, text }),
        });
        const data = await res.json();
        feedbackBox.textContent = data.feedback;
        feedbackBox.style.display = "block";
      } catch (e) {
        feedbackBox.textContent = "Couldn't reach the feedback service — your entry was still saved.";
        feedbackBox.style.display = "block";
      } finally {
        loading.style.display = "none";
      }
    });
  });
</script>

</body>
</html>
